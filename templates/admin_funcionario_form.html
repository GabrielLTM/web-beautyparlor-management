<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- O título da página será dinâmico -->
    <title>{{ 'Editar Funcionário' if funcionario else 'Adicionar Novo Funcionário' }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <a href="/painel/admin/funcionarios" class="btn btn-secondary mb-3">&larr; Voltar para a lista</a>

    <h1>{{ 'Editar Funcionário' if funcionario else 'Adicionar Novo Funcionário' }}</h1>

    <!-- Local para exibir mensagens de erro -->
    {% if error %}
        <div class="alert alert-danger mt-3" role="alert">
            {{ error }}
        </div>
    {% endif %}

    <!-- O 'action' do formulário é dinâmico, vindo do backend -->
    <form action="{{ action_url }}" method="post" class="mt-4">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome:</label>
            <input type="text" id="nome" name="nome" class="form-control"
                   value="{{ funcionario.nome if funcionario else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="cargo" class="form-label">Cargo (Ex: Cabeleireira, Manicure):</label>
            <input type="text" id="cargo" name="cargo" class="form-control"
                   value="{{ funcionario.cargo if funcionario else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="funcao" class="form-label">Função no Sistema:</label>
            <select id="funcao" name="funcao" class="form-select" required>
                <option value="Funcionario" {% if funcionario and funcionario.funcao == 'Funcionario' %}selected{% endif %}>
                    Funcionário (Padrão)
                </option>
                <option value="Admin" {% if funcionario and funcionario.funcao == 'Admin' %}selected{% endif %}>
                    Administrador
                </option>
            </select>
        </div>
        <div class="mb-3">
            <label for="senha" class="form-label">
                <!-- A label da senha também muda -->
                {{ 'Nova Senha (deixe em branco para não alterar)' if funcionario else 'Senha:' }}
            </label>
            <input type="password" id="senha" name="senha" class="form-control"
                   {% if not funcionario %}required{% endif %}>
        </div>

        <button type="submit" class="btn btn-primary">
            {{ 'Salvar Alterações' if funcionario else 'Adicionar Funcionário' }}
        </button>
    </form>

</body>
</html>
