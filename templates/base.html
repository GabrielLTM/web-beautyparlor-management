<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Painel de Gestão{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% block styles %}{% endblock %}
</head>
<body>

    <!-- ================== BARRA DE NAVEGAÇÃO UNIVERSAL ================== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/painel">Bella Estética</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="navbar-text me-3">
                            Olá, {{ user.nome }}!
                        </span>
                    </li>
                    <li class="nav-item">
                        <a href="/painel/clientes" class="btn btn-success btn-sm me-2">Hub de Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a href="/painel/dashboard" class="btn btn-primary btn-sm me-2">Meu Desempenho</a>
                    </li>
                    <li class="nav-item">
                        <a href="/painel/logs" class="btn btn-info btn-sm me-2">Ver Logs</a>
                    </li>
                    {% if user.funcao == 'Admin' %}
                    <li class="nav-item">
                        <a href="/painel/admin" class="btn btn-danger btn-sm me-2">Administração</a>
                    </li>
                    {% endif %}
                    <li class="nav-item">
                        <!-- Botão de Sair que ainda vamos implementar -->
                        <a href="/logout" class="btn btn-outline-light btn-sm">Sair</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ================== CONTEÚDO PRINCIPAL DA PÁGINA ================== -->
    <main class="container mt-4">
        <!-- Este é o bloco que cada página filha irá preencher com o seu conteúdo único -->
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Bloco para scripts JavaScript específicos de cada página -->
    {% block scripts %}{% endblock %}
</body>
</html>
