<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão - Salão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .list-group-item a { text-decoration: none; color: inherit; }
        .list-group-item:hover { background-color: #f8f9fa; }
    </style>
</head>
<body class="container mt-4">

    <!-- ================== CABEÇALHO DA PÁGINA CORRIGIDO ================== -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
        <h1>Painel de Gestão</h1>
        <div class="d-flex align-items-center">
            <span class="me-3">Olá, {{ user.nome }}!</span>

            <a href="/painel/clientes" class="btn btn-success">Hub de Clientes</a>
            <a href="/painel/dashboard" class="btn btn-primary mx-2">Meu Desempenho</a>

            <!-- ### BOTÃO DE LOGS RESTAURADO AQUI ### -->
            <a href="/painel/logs" class="btn btn-info">Ver Logs</a>

            {% if user.funcao == 'Admin' %}
                <a href="/painel/admin" class="btn btn-danger ms-2">Administração</a>
            {% endif %}
        </div>
    </div>

    <!-- ============= LISTA DE FUNCIONÁRIOS ============= -->
    <div class="card">
        <div class="card-header">
            <h2>Agendas dos Funcionários</h2>
        </div>
        <div class="list-group list-group-flush">
            {% for func in funcionarios %}
            <div class="list-group-item list-group-item-action">
                <a href="/painel/funcionarios/{{ func.id }}" class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1">{{ func.nome }}</h5>
                        <small class="text-muted">{{ func.cargo }}</small>
                    </div>
                    <span>Ver Agenda &rarr;</span>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
