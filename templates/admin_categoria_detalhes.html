<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerir Categoria - {{ categoria.nome }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <a href="/painel/admin/categorias" class="btn btn-secondary mb-3">&larr; Voltar para a lista de categorias</a>
    <h1>Gerir Categoria</h1>
    <p class="lead">Edite o nome da categoria e selecione os serviços que pertencem a ela.</p>

    <form method="post">
        <!-- Secção para editar o nome da categoria -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title">Nome da Categoria</h5>
                <div class="mb-3">
                    <input type="text" id="nome_categoria" name="nome_categoria" class="form-control" value="{{ categoria.nome }}" required>
                </div>
            </div>
        </div>

        <!-- Secção para associar serviços -->
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Serviços nesta Categoria</h5>
                <p class="card-text">Marque os serviços que devem ser agrupados sob "<strong>{{ categoria.nome }}</strong>".</p>
                <div class="row">
                    {% for servico in todos_os_servicos %}
                        <div class="col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="servicos_selecionados" value="{{ servico.id }}" id="servico-{{ servico.id }}"
                                    {% if servico.categoria_id == categoria.id %}checked{% endif %}>
                                <label class="form-check-label" for="servico-{{ servico.id }}">
                                    {{ servico.nome }}
                                </label>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary mt-4">Salvar Alterações</button>
    </form>

</body>
</html>
