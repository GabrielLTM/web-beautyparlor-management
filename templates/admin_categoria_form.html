<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Categoria - {{ categoria.nome }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <a href="/painel/admin/categorias" class="btn btn-secondary mb-3">&larr; Voltar para a lista de categorias</a>
    <h1>Editar Categoria</h1>

    {% if error %}
        <div class="alert alert-danger mt-3" role="alert">
            {{ error }}
        </div>
    {% endif %}

    <!-- O 'action' vazio envia os dados para a mesma URL -->
    <form method="post">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome da Categoria:</label>
            <input type="text" id="nome" name="nome" class="form-control" value="{{ categoria.nome }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Salvar Alterações</button>
    </form>

</body>
</html>
