<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Agendamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <a href="/painel/funcionarios/{{ agendamento.funcionario_id }}" class="btn btn-secondary mb-3">&larr; Voltar para a agenda</a>

    <h1>Editar Agendamento</h1>
        {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
        {% endif %}
    <div class="card p-3">
        <p><strong>Cliente:</strong> {{ agendamento.nome_cliente }}</p>
        <p><strong>Serviço:</strong> {{ agendamento.servico.nome }}</p>
        <p><strong>Horário:</strong> {{ agendamento.data_hora.strftime('%d/%m/%Y às %H:%M') }}</p>
    </div>

    <form method="post" class="mt-4">
        <div class="mb-3">
            <label for="preco_final" class="form-label">Preço Final (R$):</label>
            <input type="number" step="0.01" id="preco_final" name="preco_final" value="{{ agendamento.preco_final }}" required class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Salvar Alterações</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
