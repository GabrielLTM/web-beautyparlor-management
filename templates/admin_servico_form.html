<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título dinâmico: muda se estamos a editar ou a adicionar -->
    {% if servico %}
        <title>Editar Serviço - {{ servico.nome }}</title>
    {% else %}
        <title>Adicionar Novo Serviço</title>
    {% endif %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <a href="/painel/admin/servicos" class="btn btn-secondary mb-3">&larr; Voltar para a lista de serviços</a>

    <!-- Título dinâmico -->
    {% if servico %}
        <h1>Editar Serviço</h1>
    {% else %}
        <h1>Adicionar Novo Serviço</h1>
    {% endif %}

    <!-- Exibe uma mensagem de erro, se houver -->
    {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
    {% endif %}


    <!-- O 'action' vazio envia os dados para a mesma URL, o que funciona tanto para /novo como para /{id}/editar -->
    <form method="post">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome do Serviço:</label>
            <!-- O 'value' pré-preenche o campo se estivermos a editar -->
            <input type="text" id="nome" name="nome" class="form-control" value="{{ servico.nome if servico else '' }}" required>
        </div>

        <!-- ### NOVO CAMPO DE CATEGORIA ADICIONADO ### -->
        <div class="mb-3">
            <label for="categoria_id" class="form-label">Categoria:</label>
            <select id="categoria_id" name="categoria_id" class="form-select" required>
                <option value="" disabled {% if not servico or not servico.categoria_id %}selected{% endif %}>-- Escolha uma categoria --</option>
                {% for categoria in categorias %}
                    <option value="{{ categoria.id }}" {% if servico and servico.categoria_id == categoria.id %}selected{% endif %}>
                        {{ categoria.nome }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="duracao_padrao_minutos" class="form-label">Duração Padrão (em minutos):</label>
            <input type="number" id="duracao_padrao_minutos" name="duracao_padrao_minutos" class="form-control" value="{{ servico.duracao_padrao_minutos if servico else '' }}" required>
        </div>
        <div class="mb-3">
            <label for="preco_minimo" class="form-label">Preço Mínimo (R$):</label>
            <input type="number" step="0.01" id="preco_minimo" name="preco_minimo" class="form-control" value="{{ servico.preco_minimo if servico else '' }}" required placeholder="Ex: 90.50">
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>

</body>
</html>
