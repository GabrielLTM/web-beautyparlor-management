<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Novo Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <!-- O link de voltar agora aponta para o Hub de Clientes -->
    <a href="/painel/clientes" class="btn btn-secondary mb-3">&larr; Voltar para a lista de clientes</a>
    <h1>Cadastrar Novo Cliente</h1>
    <p class="lead">Preencha os dados abaixo para adicionar um novo cliente ao sistema.</p>

    {% if error %}
        <div class="alert alert-danger" role="alert">
            {{ error }}
        </div>
    {% endif %}

    <form method="post">
        <div class="card">
            <div class="card-body">
                <div class="mb-3">
                    <label for="nome" class="form-label">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="whatsapp" class="form-label">WhatsApp:</label>
                    <input type="tel" id="whatsapp" name="whatsapp" class="form-control"
                           required placeholder="(XX) XXXXX-XXXX" maxlength="15"
                           pattern="\([0-9]{2}\) [0-9]{4,5}-[0-9]{4}">
                </div>
                <button type="submit" class="btn btn-primary">Salvar e Ir para o Perfil do Cliente</button>
            </div>
        </div>
    </form>

    <script>
        // Reutilizamos a mesma máscara de WhatsApp da página da agenda
        const whatsappInput = document.getElementById('whatsapp');
        whatsappInput.addEventListener('input', function (e) {
            let value = e.target.value.replace(/\D/g, '');
            value = value.substring(0, 11);
            if (value.length > 2) {
                value = `(${value.substring(0, 2)}) ${value.substring(2)}`;
            }
            if (value.length > 9) {
                 value = `${value.substring(0, 10)}-${value.substring(10)}`;
            } else if (value.length > 8 && value.length <=9) {
                value = `${value.substring(0, 9)}-${value.substring(9)}`;
            }
            e.target.value = value;
        });
    </script>

</body>
</html>
